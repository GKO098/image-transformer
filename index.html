<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Transform (OpenCV.js)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Image Transform (OpenCV.js)</h1>
        <p>Upload an image, adjust transforms, then download.</p>
      </header>

      <section class="controls">
        <div class="control-row">
          <label class="file">
            <span>Image</span>
            <input id="fileInput" type="file" accept="image/*" />
          </label>
          <button id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <section class="canvas-wrap">
        <div class="canvas-col">
          <h2>Input</h2>
          <div class="canvas-stack">
            <canvas id="sourceCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
          </div>
        </div>
      </section>

      <section class="controls">
        <div class="control-grid">
          <label>
            Rotation 2D (deg)
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="rot2d" data-dir="-1">-</button>
              <input id="rot2d" type="range" min="-180" max="180" step="1" value="0" />
              <button class="step-btn" type="button" data-target="rot2d" data-dir="1">+</button>
              <input
                id="rot2dVal"
                class="value-input"
                type="number"
                step="1"
                min="-180"
                max="180"
                value="0"
                data-target="rot2d"
              />
            </div>
          </label>
          <label>
            Roll (deg)
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="roll" data-dir="-1">-</button>
              <input id="roll" type="range" min="-180" max="180" step="1" value="0" />
              <button class="step-btn" type="button" data-target="roll" data-dir="1">+</button>
              <input
                id="rollVal"
                class="value-input"
                type="number"
                step="1"
                min="-180"
                max="180"
                value="0"
                data-target="roll"
              />
            </div>
          </label>
          <label>
            Yaw (deg)
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="yaw" data-dir="-1">-</button>
              <input id="yaw" type="range" min="-10" max="10" step="0.1" value="0" />
              <button class="step-btn" type="button" data-target="yaw" data-dir="1">+</button>
              <input
                id="yawVal"
                class="value-input"
                type="number"
                step="0.1"
                min="-10"
                max="10"
                value="0"
                data-target="yaw"
              />
            </div>
          </label>
          <label>
            Pitch (deg)
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="pitch" data-dir="-1">-</button>
              <input id="pitch" type="range" min="-10" max="10" step="0.1" value="0" />
              <button class="step-btn" type="button" data-target="pitch" data-dir="1">+</button>
              <input
                id="pitchVal"
                class="value-input"
                type="number"
                step="0.1"
                min="-10"
                max="10"
                value="0"
                data-target="pitch"
              />
            </div>
          </label>
          <label>
            Skew X
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="skewX" data-dir="1">-</button>
              <input id="skewX" type="range" min="-1" max="1" step="0.01" value="0" />
              <button class="step-btn" type="button" data-target="skewX" data-dir="-1">+</button>
              <input
                id="skewXVal"
                class="value-input"
                type="number"
                step="0.01"
                min="-1"
                max="1"
                value="0"
                data-target="skewX"
              />
            </div>
          </label>
          <label>
            Skew Y
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="skewY" data-dir="-1">-</button>
              <input id="skewY" type="range" min="-1" max="1" step="0.01" value="0" />
              <button class="step-btn" type="button" data-target="skewY" data-dir="1">+</button>
              <input
                id="skewYVal"
                class="value-input"
                type="number"
                step="0.01"
                min="-1"
                max="1"
                value="0"
                data-target="skewY"
              />
            </div>
          </label>
          <label>
            Focal Length
            <div class="slider-row">
              <button class="step-btn" type="button" data-target="focal" data-dir="-1">-</button>
              <input id="focal" type="range" min="200" max="2000" step="10" value="800" />
              <button class="step-btn" type="button" data-target="focal" data-dir="1">+</button>
              <input
                id="focalVal"
                class="value-input"
                type="number"
                step="10"
                min="200"
                max="2000"
                value="800"
                data-target="focal"
              />
            </div>
          </label>
        </div>
      </section>

      <section class="canvas-wrap">
        <div class="canvas-col">
          <h2>Output</h2>
          <canvas id="outputCanvas"></canvas>
          <div class="control-row">
            <button id="downloadBtn" class="btn-download" type="button">Download</button>
          </div>
        </div>
      </section>

      <section class="perspective">
        <h2>台形補正</h2>
        <p class="hint">Input 画像を4点クリックすると、自動で補正結果を表示します。</p>
        <div class="control-row">
          <button id="clearPointsBtn" type="button">Clear Points</button>
          <span id="pointStatus">0/4</span>
          <button id="perspectiveDownloadBtn" class="btn-download" type="button">
            Download Perspective
          </button>
        </div>
        <div class="canvas-wrap">
          <div class="canvas-col">
            <h2>Perspective Output</h2>
            <canvas id="perspectiveCanvas"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script async src="opencv.js"></script>
    <script src="app.js"></script>
  </body>
</html>
